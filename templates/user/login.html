{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title></title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

    <link rel="stylesheet" href="/static/user/css/index.css" >
    <script src="/static/user/css/index.js"></script>
</head>
<body style="background-image: url('/static/user/images/login3.jpg');">
    <nav class="navbar navbar-expand-lg navbar-dark static-top" style="background-color: rgb(109,0,0);">
        <img src="/static/aud2gest/images/logo3.png" height="45px" width="45px">
        <div class="container">
          <a class="navbar-brand" href="#">Koe No Katachi</a>
          <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ml-auto">
              <li class="nav-item">
                <a class="nav-link" href="../instruction">Instructions</a>
              </li>
             {% if user.is_authenticated %}
              <li class="nav-item">
                <a class="nav-link" href="../logout">Logout</a>
              </li>
              {% endif %}
            </ul>
          </div>
        </div>
    </nav>
<div class="container" >
    <div class="row">
        <div class="col-md-4">&nbsp;</div>
        <div class="col-md-4 col-md-offset-4 phone" style="background-color: black">
            <div class="row1">
                <div class="col-md-12">
                {% if error %}
                    <div style="background-color: #f8d7da; color: #721c24; padding: 12px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #f5c6cb;">
                        <strong>⚠️ Error:</strong> {{ error }}
                    </div>
                {% endif %}
                <form method="POST">
                        {%csrf_token%}
                        <label style="color: white; margin-bottom: 10px; display: block;">Username:</label>
                        <input type="text" name="username" id="telNumber" class="form-control tel" placeholder="Enter username" value="" />
                        
                        <label style="color: white; margin-top: 15px; margin-bottom: 10px; display: block;">Password:</label>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Enter password" value="" />
                        
                            <div class="num-pad">
                            <div class="span4">
                                <div class="num" style="background-image:url('/static/user/images/1.jpeg');background-size: contain;">
                                    <div class="txt" hidden>
                                        1
                                    </div>
                                </div>
                            </div>
                            <div class="span4">
                                <div class="num" style="background-image:url('/static/user/images/2.jpeg');background-size: contain;">
                                    <div class="txt" hidden> 
                                        2 
                                    </div>
                                </div>
                            </div>
                            <div class="span4">
                                <div class="num" style="background-image:url('/static/user/images/3.jpeg');background-size: contain;">
                                    <div class="txt" hidden>
                                        3 
                                    </div>
                                </div>
                            </div>
                            <div class="span4">
                                <div class="num" style="background-image:url('/static/user/images/4.jpeg');background-size: contain;">
                                    <div class="txt" hidden>
                                        4 
                                    </div>
                                </div>
                            </div>
                            <div class="span4">
                                <div class="num" style="background-image:url('/static/user/images/5.jpeg');background-size: contain;">
                                    <div class="txt" hidden>
                                        5 
                                    </div>
                                </div>
                            </div>
                            <div class="span4" >
                                <div class="num" style="background-image:url('/static/user/images/6.jpeg');background-size: contain;">
                                    <div class="txt" hidden>
                                        6 
                                    </div>
                                </div>
                            </div>
                            <div class="span4">
                                <div class="num" style="background-image:url('/static/user/images/7.jpeg');background-size: contain;">
                                    <div class="txt" hidden>
                                        7 
                                    </div>
                                </div>
                            </div>
                            <div class="span4">
                                <div class="num" style="background-image:url('/static/user/images/8.jpeg');background-size: contain;">
                                    <div class="txt" hidden>
                                        8
                                    </div>
                                </div>
                            </div>
                            <div class="span4">
                                <div class="num" style="background-image:url('/static/user/images/9.jpeg');background-size: contain;">
                                    <div class="txt" hidden>
                                        9
                                    </div>
                                </div>
                            </div>
                            <div class="span4">&nbsp;</div>
                            <div class="span4">
                                <div class="num" style="background-image:url('/static/user/images/0.jpeg');background-size: contain;">
                                    <div class="txt" hidden>
                                        0
                                    </div>
                                </div>
                            </div>
                            <div class="span4">&nbsp;</div>
                            </div>
                            <div class="clearfix">&nbsp;</div>
                                <button class="btn btn-success btn-block flatbtn" type="submit">Login</button>
                                <p align="center">ENTER CREDENTIALS</p>

                     </form> 
                     <h5 align="center" style="color: red">New User? &nbsp;<a href="../register">Sign Up Here</a></h5>
                </div>
            </div>
            <div class="clearfix">&nbsp;</div>
        </div>
        <div class="col-md-4">&nbsp;</div>
    </div>
</div>

</body>
</html>
